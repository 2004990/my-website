<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文档管理系统</title>
  <style>
    /* 基础样式 */
    body { font-family: Arial, sans-serif; margin: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }

    /* 标签栏样式 */
    .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab-btn { 
      padding: 8px 16px; border: 1px solid #ddd; border-radius: 4px; 
      background: #fff; cursor: pointer; transition: all 0.3s;
    }
    .tab-btn.active { background: #007bff; color: white; border-color: #007bff; }
    .tab-btn.bold-tab { font-weight: bold; } /* 特定分类加粗 */

    /* 内容区域样式 */
    .content { display: none; }
    .content.active { display: block; }
    .sub-title { 
      display: flex; justify-content: space-between; 
      padding: 10px; background: #f8f9fa; border-radius: 4px 4px 0 0;
      font-weight: bold; margin-bottom: 10px;
    }
    .sub-title span { flex: 1; text-align: center; }
    .list-wrapper { margin-bottom: 15px; }
    .list-item { 
      display: flex; justify-content: space-between; 
      padding: 8px; border-bottom: 1px solid #eee;
    }
    .list-item span { flex:1; text-align:center; word-break: break-word; }
    .list-item a { color: #007bff; text-decoration: none; }

    /* 分页样式 */
    .pagination { text-align: center; margin-top: 15px; }
    .page-btn { 
      padding: 5px 10px; margin: 0 3px; border:1px solid #ddd; 
      background: #fff; cursor: pointer; border-radius:4px;
    }
    .page-btn.active { background: #007bff; color: white; border-color: #007bff; }
    .page-btn.disabled { color: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <!-- 标签栏 -->
    <div class="tab-bar">
      <button class="tab-btn active" data-target="all">全部公告</button>
      <button class="tab-btn" data-target="performance">业绩公告</button>
      <button class="tab-btn bold-tab" data-target="daily">日常工作</button>
      <button class="tab-btn bold-tab" data-target="draft">想法草稿</button>
      <button class="tab-btn bold-tab" data-target="pinned">置顶文件</button>
    </div>

    <!-- 内容区域 -->
    <div class="content-container">
      <!-- 全部公告 -->
      <div id="all" class="content active">
        <div class="sub-title"><span>名称</span><span>时间</span><span>链接</span></div>
        <div class="list-wrapper" id="all-list"></div>
        <div class="pagination" id="all-pagination"></div>
      </div>

      <!-- 业绩公告 -->
      <div id="performance" class="content">
        <div class="sub-title"><span>名称</span><span>时间</span><span>链接</span></div>
        <div class="list-wrapper" id="performance-list"></div>
        <div class="pagination" id="performance-pagination"></div>
      </div>

      <!-- 日常工作 -->
      <div id="daily" class="content">
        <div class="sub-title"><span>名称</span><span>时间</span><span>链接</span></div>
        <div class="list-wrapper" id="daily-list"></div>
        <div class="pagination" id="daily-pagination"></div>
      </div>

      <!-- 想法草稿 -->
      <div id="draft" class="content">
        <div class="sub-title"><span>名称</span><span>时间</span><span>链接</span></div>
        <div class="list-wrapper" id="draft-list"></div>
        <div class="pagination" id="draft-pagination"></div>
      </div>

      <!-- 置顶文件 -->
      <div id="pinned" class="content">
        <div class="sub-title"><span>名称</span><span>时间</span><span>链接</span></div>
        <div class="list-wrapper" id="pinned-list"></div>
        <div class="pagination" id="pinned-pagination"></div>
      </div>
    </div>
  </div>

  <script>
    // 示例数据（可替换为实际接口数据）
    const data = {
      all: [
        { name: "公司年度报告", time: "2026-06-20", link: "#report1" },
        { name: "Q2业绩预告", time: "2026-06-15", link: "#report2" },
        { name: "日常工作会议纪要", time: "2026-06-10", link: "#meeting1" },
        { name: "新产品研发草稿", time: "2026-06-05", link: "#draft1" },
        { name: "置顶：员工手册更新", time: "2026-05-30", link: "#pinned1" },
        ...Array(15).fill(0).map((_,i)=>({name:`通用文档${i+6}`,time:`2026-05-${25-i}`,link:`#doc${i+6}`}))
      ],
      performance: [
        { name: "Q2业绩报告", time: "2026-06-15", link: "#perf1" },
        { name: "Q1业绩回顾", time: "2026-03-30", link: "#perf2" },
        ...Array(8).fill(0).map((_,i)=>({name:`业绩文档${i+3}`,time:`2026-02-${28-i}`,link:`#perf${i+3}`}))
      ],
      daily: [
        { name: "日常工作会议纪要", time: "2026-06-10", link: "#meeting1" },
        { name: "周报提交通知", time: "2026-06-08", link: "#notice1" },
        ...Array(12).fill(0).map((_,i)=>({name:`日常文档${i+3}`,time:`2026-06-${7-i}`,link:`#daily${i+3}`}))
      ],
      draft: [
        { name: "新产品研发草稿", time: "2026-06-05", link: "#draft1" },
        { name: "市场策略草案", time: "2026-06-03", link: "#draft2" },
        ...Array(9).fill(0).map((_,i)=>({name:`草稿文档${i+3}`,time:`2026-06-${2-i}`,link:`#draft${i+3}`}))
      ],
      pinned: [
        { name: "置顶：员工手册更新", time: "2026-05-30", link: "#pinned1" },
        { name: "置顶：公司规章制度", time: "2026-05-25", link: "#pinned2" }
      ]
    };

    // 初始化列表数据
    function initList(targetId) {
      const listWrapper = document.getElementById(`${targetId}-list`);
      listWrapper.innerHTML = "";
      data[targetId].forEach(item => {
        const listItem = document.createElement("div");
        listItem.className = "list-item";
        listItem.innerHTML = `
          <span>${item.name}</span>
          <span>${item.time}</span>
          <span><a href=" ">查看详情</a ></span>
        `;
        listWrapper.appendChild(listItem);
      });
    }

    // 通用分页函数（每页10条，自动计算页数）
    function initPagination(targetId) {
      const listWrapper = document.getElementById(`${targetId}-list`);
      const pagination = document.getElementById(`${targetId}-pagination`);
      const items = listWrapper.querySelectorAll(".list-item");
      const pageSize = 10; // 每页10条
      const totalPages = Math.ceil(items.length / pageSize);
      let currentPage = 1;

      // 显示指定页
      function showPage(page) {
        items.forEach((item, index) => {
          const start = (page-1)*pageSize;
          const end = page*pageSize -1;
          item.style.display = (index >= start && index <= end) ? "block" : "none";
        });
        updatePageButtons();
      }

      // 更新分页按钮
      function updatePageButtons() {
        pagination.innerHTML = "";
        // 上一页
        const prevBtn = document.createElement("button");
        prevBtn.className = `page-btn ${currentPage ===1 ? "disabled" : ""}`;
        prevBtn.textContent = "上一页";
        prevBtn.onclick = () => currentPage>1 && (currentPage--, showPage(currentPage));
        pagination.appendChild(prevBtn);

        // 页码按钮（最多显示5个）
        const startPage = Math.max(1, currentPage-2);
        const endPage = Math.min(totalPages, startPage+4);
        for(let i=startPage; i<=endPage; i++) {
          const pageBtn = document.createElement("button");
          pageBtn.className = `page-btn ${i===currentPage ? "active" : ""}`;
          pageBtn.textContent = i;
          pageBtn.onclick = () => (currentPage=i, showPage(currentPage));
          pagination.appendChild(pageBtn);
        }

        // 下一页
        const nextBtn = document.createElement("button");
        nextBtn.className = `page-btn ${currentPage === totalPages ? "disabled" : ""}`;
        nextBtn.textContent = "下一页";
        nextBtn.onclick = () => currentPage<totalPages && (currentPage++, showPage(currentPage));
        pagination.appendChild(nextBtn);
      }

      // 初始化第一页
      if(totalPages >0) showPage(currentPage);
    }

    // 标签切换逻辑
    const tabBtns = document.querySelectorAll(".tab-btn");
    tabBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        // 切换标签激活状态
        tabBtns.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        // 切换内容显示
        const targetId = btn.getAttribute("data-target");
        document.querySelectorAll(".content").forEach(content => {
          content.classList.toggle("active", content.id === targetId);
        });

        // 初始化列表和分页（首次加载）
        if(!document.getElementById(targetId).dataset.inited) {
          initList(targetId);
          initPagination(targetId);
          document.getElementById(targetId).dataset.inited = "true";
        }
      });
    });

    // 初始化默认标签（全部公告）
    initList("all");
    initPagination("all");
  </script>
</body>
</html>
